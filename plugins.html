<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugins | Veronix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="main.js" defer></script>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen font-sans">

    <nav class="bg-gray-800 border-b border-gray-700 shadow-lg">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2">
                    <span class="text-2xl font-bold tracking-wider text-white">
                        VERO<span class="text-emerald-500">NIX</span>
                    </span>
                </a>
                
                <div class="flex items-center gap-6">
                    <div class="hidden md:flex space-x-8">
                        <a href="index.html" class="text-gray-300 hover:text-emerald-400 transition-colors" data-i18n="nav_home">Home</a>
                        <a href="plugins.html" class="text-white hover:text-emerald-400 transition-colors" data-i18n="nav_plugins">Plugins</a>
                        <a href="#" class="text-gray-300 hover:text-emerald-400 transition-colors" data-i18n="nav_wiki">Wiki</a>
                        <a href="https://discord.gg/RAWdRkHtFS" target="_blank" class="text-gray-300 hover:text-emerald-400 transition-colors">Discord</a>
                    </div>
                    
                    <div class="flex items-center gap-2 border-l border-gray-600 pl-6">
                        <button onclick="switchLanguage('en')" id="btn-en" class="text-sm font-bold text-emerald-500 hover:text-emerald-400 transition-colors">EN</button>
                        <span class="text-gray-600">|</span>
                        <button onclick="switchLanguage('de')" id="btn-de" class="text-sm font-bold text-gray-400 hover:text-emerald-400 transition-colors">DE</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-16 w-full">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4" data-i18n="plugins_title">Our <span class="text-emerald-500">Plugins</span></h1>
            <p class="text-gray-400" data-i18n="plugins_desc">Discover all our projects loaded directly from Modrinth.</p>
        </div>

        <div id="plugins-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10" id="loading-indicator">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-400" data-i18n="loading">Connecting to Modrinth API...</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 border-t border-gray-800 mt-12 py-8">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-gray-500" data-i18n="footer_text">&copy; 2026 Veronix Development. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
